<div class="flex fixed inset-0 w-full h-full font-sans text-neutral-100 items-center justify-center p-4 overflow-y-auto">

  @if(authStore.isBusy()) {
    <div class="fixed inset-0 flex items-center justify-center bg-black/10 z-50">
      <app-busy />
    </div>
  }

  <div class="relative max-w-md w-full mx-auto z-10 bg-[#1c1c1e]/95 border border-lime-900/30 
    rounded-4xl p-10 shadow-2xl shadow-black">

    <div class="mb-6 text-center">
      <h1 class="text-4xl font-serif mb-1"
        style="font-family: 'Copperplate', 'Times New Roman', serif;">
        Log in
      </h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" autocomplete="off" class="flex flex-col gap-4">

      <div class="mb-8 h-11">
        <app-text-input [formControl]="$any(loginForm.controls['email'])" [placeholder]="'Enter your email'" />
      </div>

      <div class="mb-8 h-11">
        <app-text-input [formControl]="$any(loginForm.controls['password'])" [placeholder]="'Enter your password'"
          [type]="'password'" />
      </div>

      <button type="submit" [disabled]="loginForm.invalid" 
        class="btn btn-outline w-full h-14 bg-lime-300 hover:bg-lime-200 text-[#1a1a1a] rounded-2xl text-lg font-bold 
          transition-all active:scale-[0.98] shadow-lg shadow-lime-950/20 
          disabled:bg-white/50 disabled:text-neutral-400 disabled:border-gray-300">
        Log In
      </button>

      @if (googleSignInEnabled) {
        <div class="relative flex items-center my-1">
          <div class="grow border-t border-neutral-700/50"></div>
          <span class="px-3 text-xs text-neutral-500 uppercase font-medium">or</span>
          <div class="grow border-t border-neutral-700/50"></div>
        </div>

        <div
          #googleSignInHost
          class="google-sign-in-host w-full min-h-14"
        ></div>
      }

      <div class="flex justify-center items-center px-1">
        <p class="text-xs text-neutral-400">
          Don't have an account? <a [routerLink]="'/' + ROUTES.REGISTER" class="text-lime-300 font-bold hover:underline">Sign Up</a>
        </p>
      </div>
    </form>
  </div>

  <div class="mt-8 max-w-md w-full mx-auto space-y-3">
        <div class="flex items-center gap-2 px-4 mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0116 0z" />
            </svg>
            <span class="text-xs font-bold text-white/60 uppercase tracking-widest">Demo Credentials</span>
        </div>

        @for (row of demoCredentialRows; track row.id) {
        <div [id]="row.id" (click)="useDemoCreds(row.id)"
            class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl p-4 flex justify-between items-center 
            transition-all hover:bg-white/15 cursor-pointer">
            <div class="flex flex-col">
                <span class="text-[10px] text-brand-accent font-bold uppercase tracking-tighter">Email</span>
                <span class="text-sm text-white font-mono">{{ row.email }}</span>
            </div>
            <div class="h-8 w-px bg-white/10"></div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-white/40 font-bold uppercase">Password</span>
                <span class="text-sm text-white font-mono">{{ row.password }}</span>
            </div>
        </div>
        }
    </div>
    
</div>
