<div
  *ngFor="let user of users()"
  class="flex items-center gap-3 px-4 py-3 border-b border-white/10"
>
  <img
    *ngIf="hasPhotoUrl(user.profilePhotoUrl)"
    [src]="user.profilePhotoUrl!"
    [alt]="''"
    class="h-10 w-10 shrink-0 rounded-full object-cover"
  />
  <div
    *ngIf="!hasPhotoUrl(user.profilePhotoUrl)"
    class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-white/10 text-xs font-semibold text-neutral-200 select-none"
    aria-hidden="true"
  >
    {{ userInitials(user) }}
  </div>

  <div class="flex min-w-0 flex-1 flex-col gap-0.5">
    <span class="truncate text-sm font-medium text-neutral-300">
      {{ emailLocalPart(user.email) }}
    </span>
    <span *ngIf="userDisplayName(user)" class="truncate text-xs text-neutral-400">
      {{ userDisplayName(user) }}
    </span>
  </div>
</div>
