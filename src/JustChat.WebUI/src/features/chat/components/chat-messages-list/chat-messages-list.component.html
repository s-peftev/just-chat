<div
  #scrollContainer
  (scroll)="scrolled.emit($event)"
  class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden flex flex-col p-4"
>
  <app-chat-message-item
    *ngFor="let message of messages(); let i = index"
    [message]="message"
    [ownEmail]="ownEmail()"
    [showIncomingAvatar]="showIncomingAvatarAt(i)"
    (senderAvatarEnter)="senderAvatarEnter.emit($event)"
    (senderAvatarLeave)="senderAvatarLeave.emit()"
  />
  <div #scroll></div>
</div>

<button
  *ngIf="showScrollToBottom()"
  type="button"
  (click)="scrollToLatestClick.emit()"
  class="absolute bottom-20 right-4 w-10 h-10 rounded-full border border-lime-400/40 bg-lime-500/25 
    text-neutral-100 backdrop-blur-sm hover:bg-lime-400/35
      flex items-center justify-center shadow-lg shadow-black/40 transition"
  aria-label="Scroll to latest message"
>
  <span class="text-lg">↓</span>
</button>
