<div class="relative flex min-h-0 flex-1 flex-col rounded-4xl w-full text-neutral-100 shadow-2xl shadow-black">
  <!-- HEADER -->


  <!-- BODY -->
  <div class="flex min-h-0 flex-1 overflow-hidden rounded-4xl border border-white/10">

    <!-- USERS -->
    <div class="w-1/5 rounded-l-4xl border-r border-white/8 bg-black/25 backdrop-blur-md min-h-0 overflow-y-auto">
      <div
        *ngFor="let user of chatStore.usersInChat()"
        class="flex items-center gap-3 px-4 py-3 border-b border-white/10"
      >
        <img
          [src]="user.profilePhotoUrl"
          class="w-10 h-10 rounded-full object-cover"
        />

        <span class="text-sm font-medium text-neutral-300">
          {{ user.email }}
        </span>
      </div>
    </div>

    <!-- CHAT -->
    <div class="relative flex min-h-0 min-w-0 w-4/5 flex-col overflow-hidden rounded-r-4xl bg-black/25 backdrop-blur-md">

      <!-- MESSAGES -->
      <div #scrollContainer (scroll)="onScroll()"
        class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden flex flex-col p-4"
      >
        <ng-container *ngFor="let message of chatStore.chatMessages().items; let i = index">

          <div
            #messageItem
            class="flex mb-3"
            [ngClass]="{
              'justify-end': message.sender.email === profileStore.email(),
              'justify-start': message.sender.email !== profileStore.email()
            }"
          >
            <div
              class="max-w-[75%] rounded-xl px-4 py-2 wrap-break-word"
              [ngClass]="{
                'border border-white/10 bg-white/25 text-neutral-100':
                  message.sender.email === profileStore.email(),
                'border border-white/10 bg-black/25 text-neutral-100 backdrop-blur-md':
                  message.sender.email !== profileStore.email()
              }"
            >

              <!-- avatar -->
              <div
                *ngIf="
                  message.sender.email !== profileStore.email()
                "
                class="flex items-start gap-2 mb-1"
              >
                <img
                  [src]="message.sender.profilePhotoUrl"
                  class="w-7 h-7 rounded-full"
                />
                <span class="text-sm font-semibold text-neutral-300 mt-1">
                  {{ message.sender.email }}
                </span>
              </div>

              <p class="text-sm leading-snug">
                {{ message.text }}
              </p>

              <span class="block text-[10px] mt-1 opacity-80 text-neutral-100">
                {{ message.createdAt | date: 'medium' }}
                |
                {{ messageSentiments[message.sentiment] }}
              </span>
            </div>
          </div>

        </ng-container>
        <div #scroll ></div>
      </div>

      <button
        *ngIf="showScrollToBottom"
        type="button"
        (click)="scrollToLatest()"
        class="absolute bottom-20 right-4 w-10 h-10 rounded-full border border-lime-400/40 bg-lime-500/25 text-neutral-100 backdrop-blur-sm hover:bg-lime-400/35
               flex items-center justify-center shadow-lg shadow-black/40 transition"
        aria-label="Scroll to latest message"
      >
        <span class="text-lg">↓</span>
      </button>

      <!-- INPUT -->
      <div class="shrink-0 border-t border-white/10 bg-black/25 backdrop-blur-md p-3 relative">
        <input
          #messageInput
          [(ngModel)]="inputedMessage"
          (keydown.enter)="sendMessage()"
          type="text"
          placeholder="Type a message..."
          class="w-full h-12 pr-14 px-4 bg-transparent text-neutral-100 
            placeholder:text-neutral-200 focus:outline-none "
        />

        <button
          (click)="sendMessage()"
          type="button"
          class="absolute right-4 top-1/2 -translate-y-1/2
                 w-9 h-9 rounded-full border border-lime-400/40 bg-lime-500/30 text-neutral-100
                 hover:bg-lime-400/35 backdrop-blur-sm
                 flex items-center justify-center transition"
        >
        SEND
        </button>
      </div>

    </div>
  </div>
</div>
