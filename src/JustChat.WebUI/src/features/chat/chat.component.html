<div class="relative flex min-h-0 flex-1 flex-col rounded-4xl w-full text-neutral-100 shadow-2xl shadow-black">
  <!-- HEADER -->


  <!-- BODY -->
  <div class="flex min-h-0 flex-1 overflow-hidden rounded-4xl border border-white/10">

    <app-chat-active-users [users]="chatStore.usersInChat()" />

    <!-- CHAT -->
    <div class="relative flex min-h-0 min-w-0 w-4/5 flex-col overflow-hidden rounded-r-4xl bg-black/25 backdrop-blur-md">

      <app-chat-messages-list
        [messages]="chatStore.chatMessages().items"
        [ownEmail]="profileStore.email() ?? ''"
        [showScrollToBottom]="chatScroll.showScrollToBottom"
        (scrolled)="onScroll($event)"
        (scrollToLatestClick)="scrollToLatest()"
        (senderAvatarEnter)="onSenderAvatarEnter($event.event, $event.sender)"
        (senderAvatarLeave)="onSenderAvatarLeave()"
      />

      <!-- INPUT -->
      <div class="relative shrink-0 border-t border-white/10 bg-black/25 backdrop-blur-md p-3">
        <textarea
          #messageInput
          rows="1"
          [(ngModel)]="inputedMessage"
          (input)="adjustMessageInputHeight()"
          (keydown)="onMessageInputKeydown($event)"
          placeholder="Type a message..."
          class="box-border max-h-32 min-h-12 w-full resize-none overflow-y-auto border-0 bg-transparent 
            px-4 py-[0.65rem] pr-24 leading-normal text-neutral-100 placeholder:text-neutral-300/50 focus:outline-none"
        ></textarea>

        <button
          type="button"
          class="absolute bottom-3 right-18 flex h-11 w-11 cursor-default items-center 
            justify-center text-xl text-neutral-300/50 transition hover:text-neutral-200"
          aria-label="Emoji picker"
          (mouseenter)="onEmojiTriggerEnter($event)"
          (mouseleave)="onEmojiTriggerLeave()"
        >
          <span aria-hidden="true">
            <svg 
              width="32"
              height="32" 
              viewBox="0 0 16 16" 
              fill="currentColor"
              >
              <path fill-rule="evenodd" clip-rule="evenodd" d="M4.111 2.18a7 7 0 1 1 7.778 11.64A7 7 0 0 1 4.11 2.18zm.556 10.809a6 6 0 1 0 6.666-9.978 6 6 0 0 0-6.666 9.978zM6.5 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM8 11a3 3 0 0 1-2.65-1.58l-.87.48a4 4 0 0 0 7.12-.16l-.9-.43A3 3 0 0 1 8 11z"/>
            </svg>
          </span>
        </button>

        <button
          (click)="sendMessage()"
          type="button"
          class="absolute bottom-3 right-4 flex h-11 w-11 items-center justify-center 
          text-neutral-300/50 cursor-pointer active:text-lime-400/50"
        >
          <svg 
            viewBox="0 0 24 24" 
            width="22" 
            height="22" 
            stroke="currentColor" 
            stroke-width="2" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <app-float-tooltip
    [visible]="avatarTooltipSender !== null"
    [leftPx]="senderTooltipLeftPx"
    [topPx]="senderTooltipTopPx"
    panelClass="w-max max-w-[min(90vw,18rem)] rounded-2xl border border-white/15 bg-zinc-950/95 p-4 shadow-2xl backdrop-blur-md"
    (popoverEnter)="onSenderTooltipPopoverEnter()"
    (popoverLeave)="onSenderTooltipPopoverLeave()"
  >
    @if (avatarTooltipSender; as sender) {
      <img
        *ngIf="hasPhotoUrl(sender.profilePhotoUrl)"
        [src]="sender.profilePhotoUrl!"
        [alt]=""
        class="mx-auto block h-28 w-28 rounded-full object-cover"
      />
      <div
        *ngIf="!hasPhotoUrl(sender.profilePhotoUrl)"
        class="mx-auto flex h-28 w-28 items-center justify-center rounded-full bg-white/10 text-4xl font-semibold leading-none text-neutral-200 select-none"
        aria-hidden="true"
      >
        {{ userInitials(sender) }}
      </div>
      <p class="mt-3 break-all text-center text-sm text-neutral-200">
        {{ sender.email }}
      </p>
      <p *ngIf="userDisplayName(sender)" class="mt-1 text-center text-sm text-neutral-400">
        {{ userDisplayName(sender) }}
      </p>
    }
  </app-float-tooltip>

  <app-float-tooltip
    [visible]="emojiTooltipVisible"
    [leftPx]="emojiTooltipLeftPx"
    [topPx]="emojiTooltipTopPx"
    panelClass="rounded-2xl border border-white/15 bg-zinc-950/95 p-2 shadow-2xl backdrop-blur-md overflow-hidden"
    (popoverEnter)="onEmojiTooltipPopoverEnter()"
    (popoverLeave)="onEmojiTooltipPopoverLeave()"
  >
    <emoji-picker (emoji-click)="onEmojiClick($event)"></emoji-picker>
  </app-float-tooltip>
</div>
