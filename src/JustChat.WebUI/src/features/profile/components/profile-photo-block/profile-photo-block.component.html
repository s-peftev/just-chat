<div class="group relative w-full max-w-[280px]">
  <input
    #photoInput
    type="file"
    class="sr-only"
    accept="image/jpeg,image/png,image/webp"
    (change)="onPhotoFileSelected($event)"
  />

  <div
    class="relative aspect-square w-full overflow-hidden rounded-3xl border border-white/10 bg-neutral-800/80 shadow-inner"
  >
    @if (profilePhotoUrl(); as url) {
      <img [src]="url" alt="Profile photo" class="h-full w-full object-cover" />
    } @else {
      <div
        class="flex h-full w-full items-center justify-center bg-gradient-to-br from-neutral-700/90 to-neutral-900/90 text-5xl font-semibold tracking-tight text-white/90 sm:text-6xl"
      >
        {{ initials() }}
      </div>
    }

    <div
      class="absolute inset-0 flex flex-col items-center justify-center gap-3 bg-black/55 p-4 opacity-0 transition-opacity duration-200 group-hover:opacity-100"
    >
      @if (profileStore.hasProfilePhoto()) {
        <button
          type="button"
          class="w-full max-w-[200px] rounded-2xl border border-white/20 bg-[#1c1c1e]/90 px-4 py-2.5 text-sm font-semibold text-neutral-100 shadow-lg transition hover:border-lime-500/40 hover:bg-[#252528]/95 hover:text-lime-200 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-lime-400/60"
          (click)="triggerPhotoInput(photoInput)"
        >
          Change photo
        </button>
        <button
          type="button"
          class="w-full max-w-[200px] rounded-2xl border border-red-400/25 bg-[#1c1c1e]/90 px-4 py-2.5 text-sm font-semibold text-red-200/90 shadow-lg transition hover:border-red-400/50 hover:bg-red-950/40 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-400/50"
          (click)="confirmDeletePhoto()"
        >
          Delete photo
        </button>
      } @else {
        <button
          type="button"
          class="w-full max-w-[200px] rounded-2xl border border-white/20 bg-[#1c1c1e]/90 px-4 py-2.5 text-sm font-semibold text-neutral-100 shadow-lg transition hover:border-lime-500/40 hover:bg-[#252528]/95 hover:text-lime-200 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-lime-400/60"
          (click)="triggerPhotoInput(photoInput)"
        >
          Upload photo
        </button>
      }
    </div>
  </div>
</div>
