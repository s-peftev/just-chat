<div
  class="fixed inset-0 z-70 flex items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="crop-photo-modal-title"
>
  <button
    type="button"
    class="absolute inset-0 cursor-default bg-black/70 backdrop-blur-md"
    (click)="onBackdropClick()"
    aria-label="Dismiss"
  ></button>

  <div
    class="relative z-10 flex w-full max-w-2xl flex-col overflow-hidden rounded-3xl border border-white/15 
    bg-[#1c1c1e]/95 p-5 shadow-2xl shadow-black/50 backdrop-blur-xl sm:p-6 isolate"
  >
    <h2
      id="crop-photo-modal-title"
      class="mb-4 text-center font-serif text-xl font-semibold tracking-tight text-neutral-50 sm:text-2xl"
      style="font-family: 'Copperplate', 'Times New Roman', serif"
    >
      Crop your photo
    </h2>

    <p class="mb-3 text-center text-sm text-neutral-400">
      Drag to reposition, resize the selection. Result will be
      {{ outputWidth }}×{{ outputHeight }} px.
    </p>

    <div class="min-h-0 w-full overflow-auto rounded-xl bg-neutral-950/40 p-2">
      <img
        [src]="imageObjectUrl()"
        alt=""
        class="block max-h-[min(65vh,520px)] max-w-full"
        (load)="onCropImageLoaded($event)"
      />
    </div>

    <div class="mt-5 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <button
        type="button"
        class="btn btn-outline w-full rounded-2xl border-white/20 bg-white/5 px-5 py-3 text-sm font-semibold text-neutral-200
          shadow-lg backdrop-blur-md transition hover:border-white/35 hover:bg-white/10 hover:text-white sm:w-auto"
        (click)="onCancel()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="btn w-full rounded-2xl border border-lime-800/40 bg-lime-300 px-5 py-3 text-sm font-semibold text-[#1a1a1a]
          shadow-lg transition hover:bg-lime-200 sm:w-auto"
        (click)="onConfirm()"
      >
        Save &amp; upload
      </button>
    </div>
  </div>
</div>
