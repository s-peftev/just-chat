<div class="flex w-full flex-col gap-1.5">
  @if (label()) {
    <label [attr.for]="fieldId" class="cursor-pointer text-sm font-medium text-white/80">
      {{ label() }}
    </label>
  }

  <input
    [attr.id]="fieldId"
    [type]="type()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
    [placeholder]="placeholder()"
    [attr.aria-invalid]="showErrors()"
    class="w-full rounded-lg border border-white/20 bg-white/10 px-4 py-3 text-base text-white shadow-sm outline-none 
      backdrop-blur-md transition-colors placeholder:text-white/40 focus:border-white/40 focus:ring-2 focus:ring-white/15 
      disabled:cursor-not-allowed disabled:border-white/10 disabled:bg-white/5 disabled:text-white/40"
  />

  @if (showErrors()) {
    <p class="m-0 text-sm text-red-300" role="alert">
      {{ control.errors | validationErrors }}
    </p>
  }
</div>
