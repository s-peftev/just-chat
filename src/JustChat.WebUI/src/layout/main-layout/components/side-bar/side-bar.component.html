<div
  class="flex min-h-[calc(100svh-2rem)] w-full flex-col rounded-4xl border border-lime-900/30 card-surface-grain p-6 shadow-2xl shadow-black"
>
  <nav
    class="flex w-full min-w-0 shrink-0 flex-col gap-2"
    aria-label="Main sections"
  >
    <a
      [routerLink]="['/', profilePath]"
      routerLinkActive="sidebar-tab-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="w-full rounded-xl px-4 py-3 text-left text-sm font-semibold tracking-wide text-neutral-400
        transition-all duration-200 hover:text-neutral-100"
    >
      Profile
    </a>
    <a
      [routerLink]="['/', chatPath]"
      routerLinkActive="sidebar-tab-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="w-full rounded-xl px-4 py-3 text-left text-sm font-semibold tracking-wide text-neutral-400
        transition-all duration-200 hover:text-neutral-100"
    >
      Chat
    </a>
  </nav>

  <div class="mt-auto shrink-0 border-t border-white/10 pt-4">
    <button
      type="button"
      class="w-full rounded-xl px-4 py-3 text-left text-sm font-semibold tracking-wide text-neutral-400 
        transition-all duration-200 hover:bg-white/5 hover:text-neutral-100 focus-visible:outline-2 
        focus-visible:outline-offset-2"
      (click)="logout()"
    >
      Log out
    </button>
  </div>
</div>
